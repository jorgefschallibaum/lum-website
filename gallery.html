<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — LUM Sunset Villas | Koh Tao</title>
  <meta name="description" content="Photo gallery of LUM — hillside sunset villas with private pools on Koh Tao, Thailand." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400&family=Hanken+Grotesk:wght@400;500&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400&family=Hanken+Grotesk:wght@400;500&display=swap" /></noscript>
  <style>
    :root{ --paper:#f4f2ed; --text:#31311d; --dim:#67614c; --cream:#f4f2ed; --grey:#41505a; --accent-ink:#9e4a1c; --display:'Newsreader',Georgia,serif; --sans:'Hanken Grotesk',-apple-system,Helvetica,Arial,sans-serif; }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ font-family:var(--sans); font-weight:400; color:var(--text); background:var(--paper); -webkit-font-smoothing:antialiased; }
    img{ display:block; max-width:100%; }
    a{ color:inherit; text-decoration:none; }
    .ghead{ display:flex; align-items:center; justify-content:space-between; padding:22px; border-bottom:1px solid rgba(49,49,29,.12); }
    .gbrand{ font-family:var(--display); font-weight:400; font-size:22px; letter-spacing:.16em; }
    .gback{ font-family:var(--sans); font-weight:500; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent-ink); }
    .gintro{ text-align:center; padding:40px 22px 8px; }
    .gintro .k{ font-family:var(--sans); font-weight:500; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); }
    .gintro h1{ font-family:var(--display); font-weight:300; font-size:clamp(32px,8vw,52px); line-height:1.05; margin-top:6px; }
    .ggrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:24px 22px 8px; }
    .ggrid img{ width:100%; height:clamp(150px,30vh,230px); object-fit:cover; }
    .ggrid .wide{ grid-column:span 2; }
    .ggrid .wide img{ height:clamp(200px,40vh,360px); }
    .gfoot{ text-align:center; padding:36px 22px 56px; }
    .gbtn{ display:inline-block; font-family:var(--sans); font-weight:500; font-size:11px; letter-spacing:.14em; text-transform:uppercase; background:var(--grey); color:var(--cream); border-radius:40px; padding:14px 28px; }
    @media (min-width:820px){
      .gintro,.gfoot{ padding-left:56px; padding-right:56px; }
      .ggrid{ grid-template-columns:repeat(3,1fr); gap:12px; padding:32px 56px 12px; }
      .ggrid img{ height:300px; }
      .ggrid .wide{ grid-column:span 2; }
      .ggrid .wide img{ height:300px; }
    }
  </style>
</head>
<body>
  <header class="ghead">
    <a class="gbrand" href="index.html">LUM</a>
    <a class="gback" href="index.html">← Back to site</a>
  </header>

  <div class="gintro">
    <span class="k">Photo &amp; film</span>
    <h1>Gallery</h1>
  </div>

  <main class="ggrid">
    <div class="wide"><img loading="lazy" decoding="async" src="Pics/sunset-drone.webp" alt="Golden sunset over the sea, Koh Tao" /></div>
    <img loading="lazy" decoding="async" src="Pics/villa.webp" alt="A private pool at LUM, Koh Tao" />
    <img loading="lazy" decoding="async" src="Pics/gallery-nang.webp" alt="Koh Nang Yuan viewpoint, Koh Tao" />
    <img loading="lazy" decoding="async" src="Pics/hero-poster.webp" alt="Palms and the sea on the hillside at LUM" />
    <img loading="lazy" decoding="async" src="Pics/sunset-a.webp" alt="Red sunset over the sea, Koh Tao" />
    <img loading="lazy" decoding="async" src="Pics/experience.webp" alt="Hammocks at sunset on Koh Tao" />
    <img loading="lazy" decoding="async" src="Pics/gallery-snorkel.webp" alt="Aerial turquoise water and snorkelling spot, Koh Tao" />
    <img loading="lazy" decoding="async" src="Pics/activities.webp" alt="Snorkelling in clear water off Koh Tao" />
    <img loading="lazy" decoding="async" src="Pics/location.webp" alt="Beach and turquoise water near LUM, Koh Tao" />
    <img loading="lazy" decoding="async" src="Pics/sunset-b.webp" alt="Longtail boats at sunset, Koh Tao" />
    <img loading="lazy" decoding="async" src="Pics/faq.webp" alt="Palms on the hillside at LUM, Koh Tao" />
  </main>

  <div class="gfoot">
    <a class="gbtn" href="index.html#book">Book your stay</a>
  </div>
</body>
</html>
